name: Dummy Dispatch Workflow

on:
  workflow_dispatch:
  repository_dispatch:
    types: [dispatch]

jobs:
  dummy-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: |
          # Resolve the latest app version from S3 using version-aware sort.
          CURRENT_VERSION="1.1"

          if [ -z "$CURRENT_VERSION" ]; then
            echo "Error: No existing versions found in S3 bucket."
            exit 1
          fi

          # CURRENT_VERSION is expected in major.minor format.
          if ! [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Error: CURRENT_VERSION ($CURRENT_VERSION) must be in major.minor format (e.g., 1.17)."
            exit 1
          fi

          # Check if setVersionId is provided in the client_payload (user-set version)
          SET_VERSION_ID="${{ github.event.client_payload.setVersionId }}"

          if [ -n "$SET_VERSION_ID" ] && [ "$SET_VERSION_ID" != "null" ]; then
            # Case 1: User provided a specific version
            echo "Using user-provided version: $SET_VERSION_ID"
            NEW_VERSION="$SET_VERSION_ID"

            # Validate version format to match CURRENT_VERSION (major.minor)
            if ! [[ "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
              echo "Error: setVersionId must be in major.minor format (e.g., 1.18)."
              exit 1
            fi

            # setVersionId must be strictly greater than CURRENT_VERSION
            if [ "$NEW_VERSION" = "$CURRENT_VERSION" ] || [ "$(printf '%s\n' "$CURRENT_VERSION" "$NEW_VERSION" | sort -V | tail -n 1)" != "$NEW_VERSION" ]; then
              echo "Error: setVersionId ($NEW_VERSION) must be greater than CURRENT_VERSION ($CURRENT_VERSION)."
              exit 1
            fi
          else
            # Case 2: Auto-increment the minor version
            echo "Auto-incrementing version (no setVersionId provided). Current version: $CURRENT_VERSION"
            MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)

            if [ -z "$MAJOR" ] || [ -z "$MINOR" ]; then
              echo "Error: CURRENT_VERSION ($CURRENT_VERSION) is not valid for minor increment."
              exit 1
            fi

            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="$MAJOR.$NEW_MINOR"
            echo "Incremented version from $CURRENT_VERSION to $NEW_VERSION"
          fi
