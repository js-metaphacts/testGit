name: Dummy Dispatch Workflow

on:
  workflow_dispatch:
  repository_dispatch:
    types: [dispatch]

jobs:
  dummy-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: |
          # Check if setVersionId is provided in the client_payload (user-set version)
          SET_VERSION_ID="${{ github.event.client_payload.setVersionId }}"
          
          if [ -n "$SET_VERSION_ID" ] && [ "$SET_VERSION_ID" != "null" ]; then
            # Case 1: User provided a specific version
            echo "Using user-provided version: $SET_VERSION_ID"
            NEW_VERSION="$SET_VERSION_ID"
            
            # Validate version format (must be MAJOR.MINOR format)
            if ! [[ "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
              echo "Error: setVersionId must be in MAJOR.MINOR format (e.g., 0.0.14)"
              exit 1
            fi
          else
            # Case 2: Auto-increment the minor version
            echo "Auto-incrementing version (no setVersionId provided)"
            CURRENT_VERSION=1.0
            
            if [ -z "$CURRENT_VERSION" ]; then
              echo "Error: No existing versions found in S3 bucket. Please provide setVersionId."
              exit 1
            fi
            
            MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
            MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="$MAJOR.$NEW_MINOR"
            echo "Incremented version from $CURRENT_VERSION to $NEW_VERSION"
          fi
